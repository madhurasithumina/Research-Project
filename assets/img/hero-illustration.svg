<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" role="img" aria-label="Multimodal mental health monitoring illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111a3a" />
      <stop offset="1" stop-color="#0b1020" />
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.95" />
      <stop offset="1" stop-color="#24d6a7" stop-opacity="0.95" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="920" height="640" rx="28" fill="url(#bg)" />

  <circle cx="160" cy="120" r="120" fill="#7c5cff" opacity="0.18" filter="url(#soft)" />
  <circle cx="770" cy="140" r="150" fill="#24d6a7" opacity="0.12" filter="url(#soft)" />
  <circle cx="640" cy="560" r="220" fill="#7c5cff" opacity="0.10" filter="url(#soft)" />

  <!-- Left: data sources -->
  <g transform="translate(72 140)">
    <rect x="0" y="0" width="260" height="360" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" />
    <text x="22" y="44" font-family="ui-sans-serif, system-ui" font-size="18" fill="rgba(255,255,255,0.86)">Signals</text>
    <text x="22" y="70" font-family="ui-sans-serif, system-ui" font-size="14" fill="rgba(255,255,255,0.62)">Text • Images • Surveys</text>

    <g transform="translate(22 104)">
      <rect width="216" height="70" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" />
      <circle cx="34" cy="35" r="18" fill="rgba(124,92,255,0.25)" stroke="rgba(124,92,255,0.55)" />
      <path d="M26 35h16M26 29h12M26 41h10" stroke="rgba(255,255,255,0.86)" stroke-width="2" stroke-linecap="round" />
      <text x="64" y="40" font-family="ui-sans-serif, system-ui" font-size="15" fill="rgba(255,255,255,0.82)">NLP text cues</text>
    </g>

    <g transform="translate(22 190)">
      <rect width="216" height="70" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" />
      <circle cx="34" cy="35" r="18" fill="rgba(36,214,167,0.22)" stroke="rgba(36,214,167,0.55)" />
      <path d="M22 31h24v16H22z" fill="none" stroke="rgba(255,255,255,0.86)" stroke-width="2" rx="3" />
      <path d="M24 43l8-8 6 6 6-5" fill="none" stroke="rgba(255,255,255,0.86)" stroke-width="2" stroke-linecap="round" />
      <text x="64" y="40" font-family="ui-sans-serif, system-ui" font-size="15" fill="rgba(255,255,255,0.82)">Facial signals</text>
    </g>

    <g transform="translate(22 276)">
      <rect width="216" height="70" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" />
      <circle cx="34" cy="35" r="18" fill="rgba(255,204,102,0.16)" stroke="rgba(255,204,102,0.55)" />
      <path d="M24 40c8-10 16 10 24 0" fill="none" stroke="rgba(255,255,255,0.86)" stroke-width="2" stroke-linecap="round" />
      <path d="M24 28h24" stroke="rgba(255,255,255,0.86)" stroke-width="2" stroke-linecap="round" />
      <text x="64" y="40" font-family="ui-sans-serif, system-ui" font-size="15" fill="rgba(255,255,255,0.82)">Survey trends</text>
    </g>
  </g>

  <!-- Center: fusion brain -->
  <g transform="translate(350 150)">
    <rect x="0" y="0" width="500" height="340" rx="24" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)" />

    <text x="28" y="48" font-family="ui-sans-serif, system-ui" font-size="18" fill="rgba(255,255,255,0.86)">Multimodal inference</text>
    <text x="28" y="74" font-family="ui-sans-serif, system-ui" font-size="14" fill="rgba(255,255,255,0.62)">Transformers + CNN + LSTM/GRU → Fusion</text>

    <g transform="translate(70 108)">
      <path d="M164 44c0-28 22-50 50-50 15 0 28 6 38 16 10-10 23-16 38-16 28 0 50 22 50 50 0 16-7 30-18 40 11 10 18 24 18 40 0 28-22 50-50 50-15 0-28-6-38-16-10 10-23 16-38 16-28 0-50-22-50-50 0-16 7-30 18-40-11-10-18-24-18-40z" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.14)" stroke-width="2" />

      <path d="M206 36c18 12 28 30 28 54" fill="none" stroke="url(#acc)" stroke-width="3" stroke-linecap="round" opacity="0.9" />
      <path d="M290 36c-18 12-28 30-28 54" fill="none" stroke="url(#acc)" stroke-width="3" stroke-linecap="round" opacity="0.9" />
      <path d="M206 152c18-12 28-30 28-54" fill="none" stroke="url(#acc)" stroke-width="3" stroke-linecap="round" opacity="0.9" />
      <path d="M290 152c-18-12-28-30-28-54" fill="none" stroke="url(#acc)" stroke-width="3" stroke-linecap="round" opacity="0.9" />

      <circle cx="248" cy="94" r="10" fill="url(#acc)" />
      <circle cx="208" cy="94" r="6" fill="rgba(255,255,255,0.65)" />
      <circle cx="288" cy="94" r="6" fill="rgba(255,255,255,0.65)" />
      <circle cx="248" cy="54" r="6" fill="rgba(255,255,255,0.65)" />
      <circle cx="248" cy="134" r="6" fill="rgba(255,255,255,0.65)" />

      <text x="248" y="210" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="rgba(255,255,255,0.72)">Fusion layer</text>
    </g>

    <!-- Outputs -->
    <g transform="translate(34 264)">
      <rect x="0" y="0" width="432" height="56" rx="16" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)" />
      <text x="18" y="24" font-family="ui-sans-serif, system-ui" font-size="14" fill="rgba(255,255,255,0.68)">Outputs</text>
      <text x="18" y="44" font-family="ui-sans-serif, system-ui" font-size="15" fill="rgba(255,255,255,0.86)">Risk level • trends • chatbot support • dashboard</text>
    </g>
  </g>

  <!-- Connector arrow -->
  <path d="M332 320h18" stroke="rgba(255,255,255,0.32)" stroke-width="3" stroke-linecap="round" />
  <path d="M350 320l-10-6v12z" fill="rgba(255,255,255,0.32)" />
</svg>
