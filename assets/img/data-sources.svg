      <text x="22" y="182" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">• pronoun patterns</text>
      <text x="22" y="208" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">• linguistic markers</text>
    </g>

    <g transform="translate(300 0)">
      <rect x="0" y="0" width="250" height="260" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" />
      <circle cx="52" cy="62" r="26" fill="rgba(36,214,167,0.18)" stroke="rgba(36,214,167,0.55)" />
      <path d="M38 52h28v20H38z" fill="none" stroke="rgba(255,255,255,0.86)" stroke-width="2.4" rx="4" />
      <path d="M42 70l8-8 7 7 7-6" fill="none" stroke="rgba(255,255,255,0.86)" stroke-width="2.4" stroke-linecap="round" />
      <text x="92" y="56" font-family="ui-sans-serif, system-ui" font-size="16" fill="rgba(255,255,255,0.86)">Images</text>
      <text x="92" y="78" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">Facial expressions</text>

