      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.95" />
      <stop offset="1" stop-color="#24d6a7" stop-opacity="0.95" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="920" height="460" rx="22" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.12)" />

  <text x="34" y="54" font-family="ui-sans-serif, system-ui" font-size="18" fill="rgba(255,255,255,0.86)">Integrated data streams</text>
  <text x="34" y="80" font-family="ui-sans-serif, system-ui" font-size="14" fill="rgba(255,255,255,0.62)">Each stream captures different aspects of psychological state</text>

  <g transform="translate(34 120)">
    <g>
      <rect x="0" y="0" width="250" height="260" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" />
      <circle cx="52" cy="62" r="26" fill="rgba(124,92,255,0.22)" stroke="rgba(124,92,255,0.50)" />
      <path d="M40 62h24M40 54h18M40 70h14" stroke="rgba(255,255,255,0.86)" stroke-width="2.4" stroke-linecap="round" />
      <text x="92" y="56" font-family="ui-sans-serif, system-ui" font-size="16" fill="rgba(255,255,255,0.86)">Social media text</text>
      <text x="92" y="78" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">Captions • posts • comments</text>

      <text x="22" y="130" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.72)">Signals</text>
