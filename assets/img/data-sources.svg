      <text x="22" y="156" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">• emotion cues</text>
      <text x="22" y="182" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">• engagement context</text>
      <text x="22" y="208" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">• visual indicators</text>
    </g>

    <g transform="translate(600 0)">
      <rect x="0" y="0" width="250" height="260" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" />
      <circle cx="52" cy="62" r="26" fill="rgba(255,204,102,0.14)" stroke="rgba(255,204,102,0.55)" />
      <path d="M36 74c10-14 20 14 30 0" fill="none" stroke="rgba(255,255,255,0.86)" stroke-width="2.4" stroke-linecap="round" />
      <path d="M36 50h30" stroke="rgba(255,255,255,0.86)" stroke-width="2.4" stroke-linecap="round" />
      <text x="92" y="56" font-family="ui-sans-serif, system-ui" font-size="16" fill="rgba(255,255,255,0.86)">Survey data</text>
      <text x="92" y="78" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">Sleep • mood • stress</text>

      <text x="22" y="130" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.72)">Signals</text>
      <text x="22" y="156" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">• longitudinal trends</text>
      <text x="22" y="182" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">• behavioral patterns</text>
      <text x="22" y="208" font-family="ui-sans-serif, system-ui" font-size="13" fill="rgba(255,255,255,0.62)">• self-reported state</text>
